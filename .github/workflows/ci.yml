name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: rag_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      postgres_test:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: rag
          POSTGRES_PASSWORD: rag
          POSTGRES_DB: test_rag
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    env:
      DATABASE_URL: postgresql+asyncpg://rag:rag@localhost:5432/rag_db
      REDIS_URL: redis://localhost:6379
      EMBEDDING_PROVIDER: sentence_transformer
      EMBEDDING_MODEL: all-MiniLM-L6-v2
      EMBEDDING_DIM: 384
      LLM_PROVIDER: openai
      LLM_MODEL: gpt-4o-mini
      OPENAI_API_KEY: dummy-key-for-ci

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy ragcore api --ignore-missing-imports

      - name: Run tests
        run: |
          pytest tests/unit \
            --cov=ragcore \
            --cov=api \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v

      - name: Run DB-backed API and integration tests
        env:
          TEST_DATABASE_URL: postgresql+asyncpg://rag:rag@localhost:5433/test_rag
        run: |
          pytest tests/api tests/integration -v
